<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-title" content="Buscador Colegio Everest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="https://colegioeverest.github.io/BuscadorEverest/favicon.png">
    
    <title>Buscador Colegio Everest</title>
    <style>
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .header { 
            background-color: #201E5B; 
            color: white; 
            width: 100%; 
            padding: 40px 0 15px 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        .header-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            width: 90%;
            max-width: 900px;
        }

        .logo-link {
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .logo-link:active {
            transform: scale(0.95);
        }

        .school-logo {
            max-height: 180px; 
            width: auto;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        .title-buscador {
            font-size: 5.0rem;
            font-weight: bold;
            font-style: italic;
            margin: 0;
            line-height: 1;
            letter-spacing: 1px;
        }
        
        .animated-subtitle {
            font-size: 1.2rem;
            margin-top: 5px;
            min-height: 2.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lupa-icon {
            height: 1em;
            width: auto;
        }

        .typewriter-wrapper {
            display: flex;
            align-items: center;
        }

        .cursor {
            display: inline-block;
            width: 4px;
            background-color: white;
            height: 1em;
            margin-left: 5px;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .header-footer {
            margin-top: 35px;
            font-size: 0.85rem;
            font-style: italic;
            opacity: 0.5;
            text-align: center;
            font-family: 'Trebuchet MS', Arial, sans-serif;
        }

        .header-footer a {
            color: white;
            text-decoration: none;
        }

        .header-footer a:hover {
            text-decoration: underline;
        }
        
        .search-container { 
            width: 90%; 
            max-width: 800px; 
            margin-top: 40px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        
        .gsc-control-cse { 
            background-color: transparent !important; 
            border: none !important; 
        }
        
        .gcsc-find-more-on-google, 
        .gcsc-find-more-on-google-magnifier, 
        .gcsc-find-more-on-google-branding, 
        .gcsc-more-maybe-branding-root, 
        .gsc-more-maybe-branding-root { 
            display: none !important; 
        }

        @media (max-width: 768px) {
            .header-main {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            .header-text {
                align-items: center;
            }
            .title-buscador {
                font-size: 3.5rem;
            }
            .animated-subtitle {
                font-size: 1.6rem;
                min-height: 2.2rem;
            }
            .school-logo {
                max-height: 120px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-main">
            <a href="#" onclick="window.location.reload(true); return false;" class="logo-link">
                <img src="https://colegioeverest.github.io/BuscadorEverest/colegioeverest.png" alt="Logo Colegio Everest" class="school-logo">
            </a>
            <div class="header-text">
                <div class="title-buscador">Buscador</div>
                <div class="animated-subtitle">
                    <img src="https://colegioeverest.github.io/BuscadorEverest/lupa.png" alt="Lupa" class="lupa-icon">
                    <div class="typewriter-wrapper">
                        <span id="typewriter-text"></span><span class="cursor"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="header-footer">
            Development by EVERTICS &bull; Powered by Google &bull; <a href="https://www.colegioeverest.cl" target="_blank">colegioeverest.cl</a>
        </div>
    </div>

    <div class="search-container">
        <script async src="https://cse.google.com/cse.js?cx=85af81c8695ad4f52"></script>
        <div class="gcse-search" data-linktarget="_self"></div>
    </div>

    <script>
        const words = ["Colegio Everest", "Semana de la convivencia", "Juntos Somos Everest"];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typewriterElement = document.getElementById("typewriter-text");

        function type() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                typewriterElement.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typewriterElement.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 2000; 
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 500; 
            }

            setTimeout(type, typeSpeed);
        }

        type();

        setInterval(function() {
            let escapeLinks = document.querySelectorAll('a[href*="google.com/search"]');
            escapeLinks.forEach(function(link) { 
                link.remove(); 
            });
        }, 1000);
    </script>

</body>
</html>
